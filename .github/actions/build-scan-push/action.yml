name: Build, scan, and push a daax image
description: >
  Builds a single image for amd64, gates on critical CVEs with Docker Scout
  (so a regression can't ship), then builds+pushes the multi-arch manifest.

inputs:
  image:
    description: Image repo (e.g. jpoley/daax-agents-base)
    required: true
  dockerfile:
    description: Path to the Dockerfile (relative to repo root)
    required: true
  context:
    description: Build context directory
    required: true
    default: devcontainer
  platforms:
    description: Comma-separated build platforms
    required: false
    default: linux/amd64,linux/arm64
  build-args:
    description: Newline-separated build args
    required: false
    default: ""
  verify-command:
    description: Optional command to run inside the built scan image before pushing
    required: false
    default: ""
  verify-entrypoint:
    description: Optional entrypoint override for the verification run
    required: false
    default: ""
  dockerhub-username:
    description: Docker Hub username
    required: true
  dockerhub-token:
    description: Docker Hub access token
    required: true
  dhi-username:
    description: DHI (dhi.io) username — only needed for images whose base is on dhi.io
    required: false
    default: ""
  dhi-token:
    description: DHI (dhi.io) access token
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}

    - name: Log in to DHI
      if: ${{ inputs.dhi-token != '' }}
      uses: docker/login-action@v3
      with:
        registry: dhi.io
        username: ${{ inputs.dhi-username }}
        password: ${{ inputs.dhi-token }}

    # Build a single-arch (amd64) image into the local daemon so it can be
    # scanned BEFORE anything is published.
    - name: Build amd64 image for scanning
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        platforms: linux/amd64
        load: true
        tags: ${{ inputs.image }}:scan
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha,scope=${{ inputs.image }}
        cache-to: type=gha,mode=max,scope=${{ inputs.image }}

    - name: Verify image runtime contract
      if: ${{ inputs.verify-command != '' }}
      shell: bash
      env:
        VERIFY_COMMAND: ${{ inputs.verify-command }}
        VERIFY_ENTRYPOINT: ${{ inputs.verify-entrypoint }}
        VERIFY_IMAGE: ${{ inputs.image }}:scan
      run: |
        verify_entrypoint=()
        if [[ -n "$VERIFY_ENTRYPOINT" ]]; then
          verify_entrypoint=(--entrypoint "$VERIFY_ENTRYPOINT")
        fi

        read -r -a verify_command <<< "$VERIFY_COMMAND"
        if [[ "${#verify_command[@]}" -eq 0 ]]; then
          echo "verify-command input was empty" >&2
          exit 1
        fi

        docker run --rm "${verify_entrypoint[@]}" "$VERIFY_IMAGE" "${verify_command[@]}"

    # Gate: fail the job (and skip the push below) on any CRITICAL that HAS a
    # fix available. `only-fixed: true` excludes criticals with no upstream fix
    # so an unfixable-in-our-base-distro CVE can't block publishing forever,
    # while any critical we could actually remediate still fails the build.
    # Concretely: Debian bookworm's perl carries CVE-2026-12087 (out-of-bounds
    # read in Socket.xs) with NO fixed version — the source package is marked
    # (unfixed) upstream and the vulnerable Socket.so lives in Essential
    # perl-base, so it can be neither upgraded nor removed. Without only-fixed
    # the base image (and everything FROM it) can never pass the gate.
    # Docker Scout is what hub.docker.com displays, so this matches the Hub view.
    - name: Scan for critical CVEs (gate)
      uses: docker/scout-action@v1
      with:
        command: cves
        image: ${{ inputs.image }}:scan
        only-severities: critical
        only-fixed: true
        exit-code: true
        dockerhub-user: ${{ inputs.dockerhub-username }}
        dockerhub-password: ${{ inputs.dockerhub-token }}

    # Only reached if the gate passed. Re-uses the amd64 layers from the gha
    # cache; builds arm64 and pushes the multi-arch manifest as :latest.
    - name: Build and push multi-arch
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: true
        provenance: false
        tags: ${{ inputs.image }}:latest
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha,scope=${{ inputs.image }}
        cache-to: type=gha,mode=max,scope=${{ inputs.image }}
