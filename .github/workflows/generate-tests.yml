name: generate-tests

# Validates the `daax dev generate-tests` Testcontainers code generator:
# unit + syntax tests, source typecheck, and a real integration harness that
# compiles the generated Go against testcontainers-go, typechecks the generated
# TypeScript against the testcontainers packages, and starts live postgres/redis
# containers (Definition of Done: "generated code compiles and the container
# starts on first run").

on:
  push:
    branches: [main]
    paths:
      - src/generate-tests/**
      - tests/**
      - scripts/verify-generated.sh
      - package.json
      - bun.lock
      - tsconfig.json
      - .github/workflows/generate-tests.yml
  pull_request:
    paths:
      - src/generate-tests/**
      - tests/**
      - scripts/verify-generated.sh
      - package.json
      - bun.lock
      - tsconfig.json
      - .github/workflows/generate-tests.yml

permissions:
  contents: read

jobs:
  generator:
    runs-on:
      group: Default
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit + syntax tests
        run: bun test tests/

      - name: Typecheck generator source
        run: bun run typecheck

      - name: Integration harness (compile + typecheck + live containers)
        # ubuntu-latest provides a Docker daemon, so live container starts run.
        run: bash scripts/verify-generated.sh
