name: Publish Devcontainer

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/daax-dev/daax-web
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
            type=raw,value=devcontainer-{{date 'YYYY-MM-DD'}}

      - name: Build and push devcontainer image
        uses: docker/build-push-action@v5
        with:
          context: ./devcontainer
          file: ./devcontainer/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/daax-dev/daax-web:buildcache
          cache-to: type=registry,ref=ghcr.io/daax-dev/daax-web:buildcache,mode=max
          provenance: true
          sbom: true
